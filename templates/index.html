<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Tournaments</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div style="display:flex;justify-content:space-between;align-items:center;">
        <h1>Badminton Tournaments</h1>
        <div style="display:flex;gap:10px;align-items:center;">
            <div id="bwf-user" style="display:none;align-items:center;gap:8px;">
                <span id="bwf-player-info" style="font-weight:bold;"></span>
                <button onclick="bwfLogout()" style="width:auto;padding:8px 16px;margin-left:8px;">Logout</button>
                <a href="/results.html"><button style="width:auto;padding:8px 16px;background:#0066cc;">Show Results</button></a>
            </div>
            <div id="admin-info" style="display:none;align-items:center;gap:8px;">
                <span id="admin-player-info" style="font-weight:bold;"></span>
                <a href="/admin.html"><button style="width:auto;padding:8px 16px;">Dashboard</button></a>
                <button onclick="bwfLogout()" style="width:auto;padding:8px 16px;background:#666;">Logout</button>
                <a href="/results.html"><button style="width:auto;padding:8px 16px;background:#0066cc;">Show Results</button></a>
            </div>
            <button id="bwf-login-btn" onclick="document.getElementById('bwf-login-modal').style.display='block'" style="width:auto;padding:8px 16px;">Login</button>
            <button id="manage-admin-btn" onclick="document.getElementById('admin-modal').style.display='block'" style="width:auto;padding:8px 16px;background:#f0a000;">Manage Admin</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="bwf-login-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;">
        <div style="background:white;max-width:400px;margin:80px auto;padding:20px;border-radius:8px;">
            <h2>Login</h2>
            <form id="bwf-login-form">
                <label for="bwf-email">Email / Username</label>
                <input type="text" id="bwf-email" placeholder="Email or username" required>
                <label for="bwf-password">Password</label>
                <input type="password" id="bwf-password" placeholder="Password" required>
                <button type="submit">Login</button>
                <button type="button" onclick="document.getElementById('bwf-login-modal').style.display='none'" style="background:#666;">Cancel</button>
                <p style="margin-top:10px;font-size:0.9em;text-align:center;">Don't have an account? <a href="https://badmintonsweden.tournamentsoftware.com/user/Signup" target="_blank" style="color:#0066cc;">Register on Badminton Sweden</a></p>
            </form>
            <p id="bwf-error" style="color:red;display:none;"></p>
        </div>
    </div>

    <!-- Manage Admin Modal -->
    <div id="admin-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;">
        <div style="background:white;max-width:450px;margin:80px auto;padding:20px;border-radius:8px;">
            <h2>Manage Admins</h2>
            <div id="admins-list" style="margin-bottom:15px;"></div>
            <h3>Add New Admin</h3>
            <form id="add-admin-form">
                <label>Badminton Sweden Username/Email</label>
                <input type="text" id="admin-new-username" placeholder="Username or email" required>
                <label>Badminton Sweden Password (to verify user)</label>
                <input type="password" id="admin-new-password" placeholder="User's BWF password" required>
                <button type="submit">Add Admin</button>
                <button type="button" onclick="document.getElementById('admin-modal').style.display='none'" style="background:#666;">Close</button>
            </form>
            <p id="admin-error" style="color:red;display:none;"></p>
            <p id="admin-success" style="color:green;display:none;"></p>
        </div>
    </div>

    <!-- Remove Admin Password Modal -->
    <div id="confirm-password-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;">
        <div style="background:white;max-width:350px;margin:120px auto;padding:20px;border-radius:8px;">
            <h3 id="confirm-password-title">Confirm</h3>
            <p id="confirm-password-msg"></p>
            <label>Admin Confirmation Password</label>
            <input type="password" id="confirm-password-input" placeholder="Password" required>
            <p id="confirm-password-error" style="color:red;display:none;"></p>
            <div style="display:flex;gap:10px;margin-top:10px;">
                <button onclick="submitConfirmPassword()" id="confirm-password-btn">Confirm</button>
                <button onclick="document.getElementById('confirm-password-modal').style.display='none'" style="background:#666;">Cancel</button>
            </div>
        </div>
    </div>

    <p id="loading-msg">Loading tournaments with open registration...</p>
    <div id="tournaments"></div>

    <script>
        async function checkBwfStatus() {
            const res = await fetch("/api/bwf-status");
            const data = await res.json();
            if (data.logged_in && data.is_admin) {
                document.getElementById("bwf-login-btn").style.display = "none";
                document.getElementById("bwf-user").style.display = "none";
                document.getElementById("admin-info").style.display = "flex";
                let display = data.player_name;
                if (data.license_id) display += ` (${data.license_id})`;
                document.getElementById("admin-player-info").textContent = "Admin: " + display;
            } else if (data.logged_in) {
                document.getElementById("bwf-user").style.display = "flex";
                let display = data.player_name;
                if (data.license_id) display += ` (${data.license_id})`;
                document.getElementById("bwf-player-info").textContent = display;
                document.getElementById("bwf-login-btn").style.display = "none";
                document.getElementById("admin-info").style.display = "none";
            } else {
                document.getElementById("bwf-user").style.display = "none";
                document.getElementById("admin-info").style.display = "none";
                document.getElementById("bwf-login-btn").style.display = "block";
            }
        }

        document.getElementById("bwf-login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById("bwf-error");
            errorEl.style.display = "none";
            const res = await fetch("/api/bwf-login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    login: document.getElementById("bwf-email").value,
                    password: document.getElementById("bwf-password").value
                })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById("bwf-login-modal").style.display = "none";
                checkBwfStatus();
                loadTournaments();
            } else {
                errorEl.textContent = data.error || "Login failed";
                errorEl.style.display = "block";
            }
        });

        async function bwfLogout() {
            await fetch("/api/bwf-logout", {method: "POST"});
            checkBwfStatus();
            loadTournaments();
        }

        // Manage Admin
        let confirmPasswordCallback = null;

        function showConfirmPassword(title, msg, btnStyle, callback) {
            document.getElementById("confirm-password-title").textContent = title;
            document.getElementById("confirm-password-msg").textContent = msg;
            document.getElementById("confirm-password-input").value = "";
            document.getElementById("confirm-password-error").style.display = "none";
            document.getElementById("confirm-password-btn").style.background = btnStyle || "";
            confirmPasswordCallback = callback;
            document.getElementById("confirm-password-modal").style.display = "block";
        }

        async function submitConfirmPassword() {
            const password = document.getElementById("confirm-password-input").value;
            if (!password) return;
            if (confirmPasswordCallback) {
                await confirmPasswordCallback(password);
            }
        }

        let pendingAdminAdd = {};

        document.getElementById("add-admin-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById("admin-error");
            const successEl = document.getElementById("admin-success");
            errorEl.style.display = "none";
            successEl.style.display = "none";

            const username = document.getElementById("admin-new-username").value.trim();
            const password = document.getElementById("admin-new-password").value;
            if (!username || !password) return;

            pendingAdminAdd = {username, password};
            showConfirmPassword("Add Admin", `Enter admin password to confirm adding "${username}":`, "#28a745", async (confirmPassword) => {
                const res = await fetch("/admin/add-admin", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({username: pendingAdminAdd.username, password: pendingAdminAdd.password, confirm_password: confirmPassword})
                });
                const data = await res.json();
                document.getElementById("confirm-password-modal").style.display = "none";
                if (data.success) {
                    successEl.textContent = `"${pendingAdminAdd.username}" added as admin.`;
                    successEl.style.display = "block";
                    document.getElementById("add-admin-form").reset();
                    loadAdmins();
                    checkBwfStatus();
                } else {
                    errorEl.textContent = data.error || "Failed to add admin";
                    errorEl.style.display = "block";
                }
            });
        });

        let removeAdminTarget = "";

        async function removeAdmin(username) {
            showConfirmPassword("Remove Admin", `Enter admin password to remove "${username}":`, "#cc3333", async (password) => {
                const res = await fetch("/admin/remove-admin", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                document.getElementById("confirm-password-modal").style.display = "none";
                if (data.success) {
                    loadAdmins();
                    checkBwfStatus();
                } else {
                    alert(data.error || "Failed to remove admin");
                }
            });
        }

        async function loadAdmins() {
            const res = await fetch("/admin/list-admins");
            const data = await res.json();
            const container = document.getElementById("admins-list");
            if (!data.success || !data.admins.length) {
                container.innerHTML = "<p style='color:#666;'>No admins yet.</p>";
                return;
            }
            container.innerHTML = data.admins.map(u => `
                <div style="display:flex;align-items:center;gap:10px;padding:5px 0;">
                    <span>${u}</span>
                    <button onclick="removeAdmin('${u.replace(/'/g, "\\\\'")}')" style="width:auto;padding:4px 10px;background:#cc3333;font-size:0.8em;">Remove</button>
                </div>
            `).join("");
        }

        // Load admins when modal opens
        document.getElementById("manage-admin-btn").addEventListener("click", loadAdmins);

        async function loadTournaments() {
            const container = document.getElementById("tournaments");
            document.getElementById("loading-msg").style.display = "block";
            container.innerHTML = "";

            const res = await fetch("/api/open-tournaments");
            const data = await res.json();
            document.getElementById("loading-msg").style.display = "none";

            if (!data.success || !data.tournaments.length) {
                container.innerHTML = "<p>No tournaments with open registration found.</p>";
                return;
            }

            const statusRes = await fetch("/api/bwf-status");
            const statusData = await statusRes.json();
            let registeredUrls = new Set();

            if (statusData.logged_in && statusData.player_name) {
                const regRes = await fetch("/api/my-registrations");
                const regData = await regRes.json();
                if (regData.success) {
                    registeredUrls = new Set(regData.registered_urls);
                }
            }

            container.innerHTML = data.tournaments.map(t => {
                const isRegistered = registeredUrls.has(t.url);
                const badge = statusData.logged_in ? (isRegistered ?
                    `<span style="background:#28a745;color:white;padding:4px 8px;border-radius:4px;font-size:0.8em;">Registered</span>` :
                    `<span style="background:#f0a000;color:white;padding:4px 8px;border-radius:4px;font-size:0.8em;">Not Registered</span>`) : "";
                return `
                <div class="tournament-card">
                    <div>
                        <h2><a href="/tournament.html?url=${encodeURIComponent(t.url)}">${t.name}</a> ${badge}</h2>
                        <p>${t.location}</p>
                        <p>Date: ${t.date_start}${t.date_end ? ' to ' + t.date_end : ''}</p>
                    </div>
                </div>
            `}).join("");
        }

        checkBwfStatus();
        loadTournaments();
    </script>
</body>
</html>
